name: Process edital PDFs

on:
  push:
    branches:
      - main
    paths:
      - "inputs/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/process.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure pdftotext is available
        run: |
          if ! command -v pdftotext >/dev/null 2>&1 || ! command -v pdftoppm >/dev/null 2>&1 || ! command -v tesseract >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-por
          fi

      - name: Process PDFs
        run: python3 scripts/extract_requirements.py --input-dir inputs --output-dir docs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
