<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leitor de Editais</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">GitHub Pages MVP</p>
          <h1>Lotes e valores de editais</h1>
          <p class="lead">
            Faça upload do PDF no repositório, rode o workflow e publique os lotes com item,
            quantidade, valor unitário e valor total.
          </p>
          <div class="hero-actions">
            <a class="button" href="https://github.com/henmohr/licitacoes-requisitos/upload/main/inputs" target="_blank" rel="noreferrer">
              Enviar PDF
            </a>
            <a class="button" href="./data/requirements.csv" download>Baixar CSV</a>
            <a class="button button-secondary" href="./data/requirements.json" download>Baixar JSON</a>
          </div>
        </div>
        <div class="stats" id="stats"></div>
      </section>

      <section class="panel status" aria-labelledby="status-title">
        <div class="panel-header">
          <h2 id="status-title">Status da última execução</h2>
          <span>Resumo do processamento mais recente</span>
        </div>
        <div id="pipelineStatus" class="status-grid"></div>
      </section>

      <section class="panel" aria-labelledby="lots-title">
        <div class="panel-header">
          <h2 id="lots-title">Lotes e valores</h2>
          <span id="lotCount"></span>
        </div>
        <div id="lots" class="lots"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
